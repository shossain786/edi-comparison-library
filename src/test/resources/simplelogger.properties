# SLF4J SimpleLogger configuration (test scope only)
# Controls log output during mvn test

# Default log level for all loggers
org.slf4j.simpleLogger.defaultLogLevel=INFO

# Per-package overrides
# Set to DEBUG to see per-file results, format detection, and diff details
org.slf4j.simpleLogger.log.com.edi.comparison=INFO
#org.slf4j.simpleLogger.log.com.edi.comparison=DEBUG

# Log output format: time | level | logger | message
org.slf4j.simpleLogger.showDateTime=true
org.slf4j.simpleLogger.dateTimeFormat=HH:mm:ss.SSS
org.slf4j.simpleLogger.showLogName=false
org.slf4j.simpleLogger.showShortLogName=true
org.slf4j.simpleLogger.showThreadName=false
org.slf4j.simpleLogger.levelInBrackets=true
